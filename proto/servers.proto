syntax = "proto3";

package servers;

option go_package = "github.com/MrEsbens/messenger-servers-service/api/servers/v1;serversv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// =============================================================================
// === MESSAGES ================================================================
// =============================================================================

// ─── Server ──────────────────────────────────────────────────────────────────

message ServerDTO {
  string id = 1;
  string name = 2;
  optional string description = 3;
  string owner_id = 4;
  ServerSettings settings = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  bool is_deleted = 8;
  
  // Иконка загружается отдельно через File Service
  optional string icon_url = 9;
  optional bool has_icon = 10;
}

message ServerSettings {
  int32 max_members = 1;
  bool allow_member_invite = 2;
  bool auto_moderation_enabled = 3;
  int32 max_message_length = 4;
}

// ─── Create Server ───────────────────────────────────────────────────────────

message CreateServerRequest {
  string name = 1;
  optional string description = 2;
  string owner_id = 3;
  optional ServerSettings settings = 4;
}

message CreateServerResponse {
  string server_id = 1;
  google.protobuf.Timestamp created_at = 2;
}

// ─── Get Server ──────────────────────────────────────────────────────────────

message GetServerRequest {
  string server_id = 1;
  string requester_id = 2; // Для проверки прав доступа
}

// ─── Update Server ───────────────────────────────────────────────────────────

message UpdateServerRequest {
  string server_id = 1;
  string updater_id = 2;
  optional string name = 3;
  optional string description = 4;
  optional ServerSettings settings = 5;
}

// ─── Delete Server ───────────────────────────────────────────────────────────

message DeleteServerRequest {
  string server_id = 1;
  string deleter_id = 2;
}

// ─── Server Members ──────────────────────────────────────────────────────────

message AddMemberRequest {
  string server_id = 1;
  string user_id = 2;
  string added_by = 3;
}

message RemoveMemberRequest {
  string server_id = 1;
  string user_id = 2;
  string removed_by = 3;
}

message IsMemberRequest {
  string server_id = 1;
  string user_id = 2;
}

message IsMemberResponse {
  bool is_member = 1;
  repeated string role_ids = 2; // ID ролей участника
}

message ListMembersRequest {
  string server_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListMembersResponse {
  repeated MemberDTO members = 1;
  bool has_more = 2;
}

message MemberDTO {
  string user_id = 1;
  string server_id = 2;
  repeated string role_ids = 3;
  google.protobuf.Timestamp joined_at = 4;
  bool is_muted = 5;
  bool is_banned = 6;
  optional google.protobuf.Timestamp muted_until = 7;
}

// ─── Server Roles ────────────────────────────────────────────────────────────

message CreateRoleRequest {
  string server_id = 1;
  string creator_id = 2;
  string name = 3;
  optional string color = 4;  // #RRGGBB
  repeated string permissions = 5;
}

message RoleDTO {
  string id = 1;
  string server_id = 2;
  string name = 3;
  string color = 4;
  repeated string permissions = 5;
  int32 position = 6;
  bool is_default = 7;
}

message UpdateRoleRequest {
  string server_id = 1;
  string role_id = 2;
  string updater_id = 3;
  optional string name = 4;
  optional string color = 5;
  repeated string permissions = 6;
}

message DeleteRoleRequest {
  string server_id = 1;
  string role_id = 2;
  string deleter_id = 3;
}

message AssignRoleRequest {
  string server_id = 1;
  string user_id = 2;
  string role_id = 3;
  string assigned_by = 4;
}

message RemoveRoleRequest {
  string server_id = 1;
  string user_id = 2;
  string role_id = 3;
  string removed_by = 4;
}

// ─── Server Chats (каналы внутри сервера) ────────────────────────────────────

message CreateServerChatRequest {
  string server_id = 1;
  string name = 2;
  string created_by = 3;
  // ← chat_type нет — все чаты на сервере = ChatTypeServer
}

message ServerChatDTO {
  string chat_id = 1;
  string server_id = 2;
  string name = 3;
  int32 position = 4;
  google.protobuf.Timestamp created_at = 5;
}

message ListServerChatsRequest {
  string server_id = 1;
  string requester_id = 2;
}

message ListServerChatsResponse {
  repeated ServerChatDTO chats = 1;
}

message DeleteServerChatRequest {
  string server_id = 1;
  string chat_id = 2;
  string deleter_id = 3;
}

// ─── Icon (через File Service) ───────────────────────────────────────────────

message GetUploadIconURLRequest {
  string server_id = 1;
  string uploader_id = 2;
  string file_name = 3;
  string mime_type = 4;
  int64 file_size = 5;
}

message GetUploadIconURLResponse {
  string file_id = 1;
  string upload_url = 2;
  string object_key = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message ConfirmIconUploadRequest {
  string server_id = 1;
  string file_id = 2;
  string confirmer_id = 3;
}

// =============================================================================
// === SERVICE =================================================================
// =============================================================================

service ServersService {
  // ─── Server CRUD ───────────────────────────────────────────────────────────
  rpc CreateServer(CreateServerRequest) returns (CreateServerResponse);
  rpc GetServer(GetServerRequest) returns (ServerDTO);
  rpc UpdateServer(UpdateServerRequest) returns (google.protobuf.Empty);
  rpc DeleteServer(DeleteServerRequest) returns (google.protobuf.Empty);
  
  // ─── Members ───────────────────────────────────────────────────────────────
  rpc AddMember(AddMemberRequest) returns (google.protobuf.Empty);
  rpc RemoveMember(RemoveMemberRequest) returns (google.protobuf.Empty);
  rpc IsMember(IsMemberRequest) returns (IsMemberResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  
  // ─── Roles ─────────────────────────────────────────────────────────────────
  rpc CreateRole(CreateRoleRequest) returns (RoleDTO);
  rpc UpdateRole(UpdateRoleRequest) returns (google.protobuf.Empty);
  rpc DeleteRole(DeleteRoleRequest) returns (google.protobuf.Empty);
  rpc AssignRole(AssignRoleRequest) returns (google.protobuf.Empty);
  rpc RemoveRole(RemoveRoleRequest) returns (google.protobuf.Empty);
  
  // ─── Server Chats ──────────────────────────────────────────────────────────
  rpc CreateServerChat(CreateServerChatRequest) returns (ServerChatDTO);
  rpc ListServerChats(ListServerChatsRequest) returns (ListServerChatsResponse);
  rpc DeleteServerChat(DeleteServerChatRequest) returns (google.protobuf.Empty);
  
  // ─── Icon (через File Service) ─────────────────────────────────────────────
  rpc GetUploadIconURL(GetUploadIconURLRequest) returns (GetUploadIconURLResponse);
  rpc ConfirmIconUpload(ConfirmIconUploadRequest) returns (google.protobuf.Empty);
}